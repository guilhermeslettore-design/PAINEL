name: Publicar curso no GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "curso-claude/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preparar conteúdo
        run: touch curso-claude/.nojekyll
      - name: Publicar na branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./curso-claude
          publish_branch: gh-pages
